<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HireReady | Login</title>

    <!-- Bootstrap -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Google Font -->

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->

    <link rel="stylesheet" href="../CSS/style.css" />
  </head>

  <body>
    <section class="login-page">
      <div class="container">
        <div class="row align-items-center min-vh-100">
          <!-- LEFT -->

          <div class="col-lg-6">
            <div class="login-content">

              <h1>Welcome to <span>HireReady</span></h1>

              <p>
                Your one-stop platform for Placement Preparation, Mock Quizzes,
                Interview Questions and Progress Tracking.
              </p>
            </div>
          </div>

          <!-- RIGHT -->

          <div class="col-lg-6">
            <div class="login-card">
              <h2>Login</h2>

              <p>Enter your name to continue</p>

              <form id="loginForm">
                <div class="mb-4">
                  <label class="form-label"> Full Name </label>

                  <input
                    type="text"
                    class="form-control"
                    id="username"
                    placeholder="Enter your full name"
                    required
                  />
                </div>

                <div class="form-check mb-4">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="remember"
                  />

                  <label class="form-check-label"> Remember Me </label>
                </div>

                <button class="btn btn-main w-100">Continue</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    

    <script src="../JS/login.js"></script>
    <script src="../JS/theme.js"></script>
  </body>
</html>
